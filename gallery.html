    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Gallery Filter Logic
      const filterBtns = document.querySelectorAll(".filter-btn");
      const galleryItems = document.querySelectorAll(".gallery-item");

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          // Change active button style
          filterBtns.forEach((b) => b.classList.remove("btn-accent", "active"));
          filterBtns.forEach((b) => b.classList.add("btn-outline-dark"));
          btn.classList.remove("btn-outline-dark");
          btn.classList.add("btn-accent", "active");

          const filterValue = btn.getAttribute("data-filter");

          galleryItems.forEach((item) => {
            if (filterValue === "all" || item.classList.contains(filterValue)) {
              item.style.display = "block";
              setTimeout(() => (item.style.opacity = "1"), 10);
            } else {
              item.style.opacity = "0";
              setTimeout(() => (item.style.display = "none"), 300);
            }
          });
        });
      });

      // Lightbox Logic
      const lightboxModal = new bootstrap.Modal(
        document.getElementById("lightboxModal"),
      );
      function openLightbox(imgSrc) {
        document.getElementById("lightboxImg").src = imgSrc;
        lightboxModal.show();
      }
    </script>
